name: Scheduled FIFA Scraper

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Build dashboard
        run: npm run build

      - name: Commit and push updated data
        run: |
          git config user.name "FIFA Scraper Bot"
          git config user.email "bot@fifa-dashboard.local"
          git add scraped-data/
          git diff --cached --quiet || git commit -m "chore: scrape update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
